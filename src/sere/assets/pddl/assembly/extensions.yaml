meta:
  name: assembly
  description: "Assembly domain with tool management, part fastening, quality tracking, and energy"
  difficulty: medium
  tags: [stochastic, numeric, embodied, manufacturing]
  enable_numeric: true
  enable_conditional: true
  enable_durations: true
  enable_stochastic: true

predicates:
  at:
    nl: ["{r} is at {l}"]
  obj-at:
    nl: ["{o} is at {l}"]
  co-located:
    nl: ["{x} and {y} are at the same location"]
  adjacent:
    nl: ["{l1} is adjacent to {l2}"]
    static: true
  holding:
    nl: ["{r} is holding {o}"]
  clear-hand:
    nl: ["{r} has a free hand"]
  in:
    nl: ["{o} is in {c}"]
  open:
    nl: ["{c} is open"]
  equipped:
    nl: ["{r} has {t} equipped"]
  tool-for:
    nl: ["{t} is suitable for {op}"]
    static: true
  aligned:
    nl: ["{p} is aligned with {a}"]
  installed:
    nl: ["{p} is installed on {a}"]
  fastened:
    nl: ["{p} is fastened to {a}"]
  damaged:
    nl: ["{o} is damaged"]
  has-charger:
    nl: ["{l} has a charging station"]
    static: true
  has-fixture:
    nl: ["{l} has a vise/fixture"]
    static: true
  powered:
    nl: ["{m} is powered"]
  defective:
    nl: ["{a} is defective"]
  needs-rework:
    nl: ["{a} needs rework"]

fluents:
  battery-cap:
    nl: ["Battery capacity of {r}"]
  energy:
    nl: ["Energy of {r}"]
  torque:
    nl: ["Torque setting on {t}"]
  quality:
    nl: ["Quality score of {a}"]

actions:
  wait:
    nl: ["Wait for {n} ticks"]
    duration_var: "n"
    duration_unit: 1.0
    outcomes:
      - name: fail
        status: fail
        p: 0.0
        add: []
        delete: []
        messages: ["Time passed but nothing changed."]
      - name: success
        status: success
        p: 1.0
        add: []
        delete: []
        messages: ["Waited {n} ticks."]

  move:
    nl: ["Move {r} from {from} to {to}"]
    duration: 1.0
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{r} tried to move from {from} to {to} but got stuck."]
      - name: success
        status: success
        p: 0.95
        add: ["(at ?r ?to)"]
        delete: ["(at ?r ?from)"]
        num_eff: ["(decrease (energy ?r) 1)"]
        messages: ["{r} moved from {from} to {to}. Energy is now (energy ?r)."]

  open:
    nl: ["Open {c}"]
    duration: 0.3
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to open {c}."]
      - name: success
        status: success
        p: 0.95
        add: ["(open ?c)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{c} is now open."]

  close:
    nl: ["Close {c}"]
    duration: 0.3
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to close {c}."]
      - name: success
        status: success
        p: 0.95
        add: []
        delete: ["(open ?c)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{c} is now closed."]

  pick-up:
    nl: ["Pick up {o}"]
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["You fumbled {o}."]
      - name: success
        status: success
        p: 0.90
        add: ["(holding ?r ?o)"]
        delete: ["(obj-at ?o ?l)", "(clear-hand ?r)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Picked up {o}."]

  put-down:
    nl: ["Put down {o}"]
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.07
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["{o} slipped; still in hand."]
      - name: success
        status: success
        p: 0.93
        add: ["(obj-at ?o ?l)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Placed {o} down."]

  put-in:
    nl: ["Put {o} into {c}"]
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Missed the opening on {c}."]
      - name: success
        status: success
        p: 0.90
        add: ["(in ?o ?c)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)", "(obj-at ?o ?l)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["{o} is now in {c}."]

  take-out:
    nl: ["Take {o} out of {c}"]
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["You couldn't get a grip on {o} in {c}."]
      - name: success
        status: success
        p: 0.90
        add: ["(holding ?r ?o)"]
        delete: ["(in ?o ?c)", "(clear-hand ?r)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Took {o} out of {c}."]

  equip-tool:
    nl: ["Equip {t}"]
    duration: 0.4
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to equip {t}."]
      - name: success
        status: success
        p: 0.95
        add: ["(equipped ?r ?t)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?t)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{t} equipped."]

  unequip-tool:
    nl: ["Unequip {t}"]
    duration: 0.4
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to unequip {t}."]
      - name: success
        status: success
        p: 0.95
        add: ["(holding ?r ?t)"]
        delete: ["(equipped ?r ?t)", "(clear-hand ?r)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{t} unequipped."]

  align:
    nl: ["Align {p} with {a}"]
    duration: 1.0
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Failed to align {p} with {a}."]
      - name: success
        status: success
        p: 0.90
        add: ["(aligned ?p ?a)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.5)"]
        messages: ["{p} aligned with {a}."]

  fasten:
    nl: ["Fasten {p} to {a}"]
    duration: 2.0
    outcomes:
      - name: hard_defect
        status: fail
        p: 0.10
        add: ["(defective ?a)"]
        delete: []
        num_eff: ["(assign (quality ?a) 0.20)", "(decrease (energy ?r) 1.0)"]
        messages: ["QC: Hard defect on {a} detected. Disassemble and reassemble."]
      - name: soft_defect
        status: fail
        p: 0.30
        add: ["(needs-rework ?a)"]
        delete: []
        num_eff: ["(assign (quality ?a) 0.65)", "(decrease (energy ?r) 1.0)"]
        messages: ["QC: Marginal quality on {a}. Rework needed."]
      - name: success
        status: success
        p: 0.60
        add: []
        delete: ["(defective ?a)", "(needs-rework ?a)"]
        num_eff: ["(assign (quality ?a) 0.95)", "(decrease (energy ?r) 1.0)"]
        messages: ["QC: {a} passed. Quality=good."]

  set-torque:
    nl: ["Set torque on {t} to {lvl}"]
    duration: 0.2
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["Torque dial slipped; setting unchanged."]
      - name: success
        status: success
        p: 1.00
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Torque on {t} set to {lvl}."]

  unfasten:
    nl: ["Unfasten {p} from {a}"]
    duration: 2.0
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Could not break {p} loose from {a}."]
      - name: success
        status: success
        p: 0.95
        add: ["(holding ?r ?p)"]
        delete: ["(fastened ?p ?a)", "(installed ?p ?a)", "(clear-hand ?r)", "(obj-at ?p ?l)"]
        num_eff: ["(decrease (energy ?r) 1.0)"]
        messages: ["Unfastened {p} from {a}; now holding {p}."]

  place-on-bench:
    nl: ["Place {o} on the bench"]
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["You hesitated; still holding {o}."]
      - name: success
        status: success
        p: 1.00
        add: ["(obj-at ?o ?l)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Placed {o} on the bench."]

  power-on:
    nl: ["Power on {m}"]
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Power button on {m} didn't register."]
      - name: success
        status: success
        p: 0.95
        add: ["(powered ?m)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{m} is now powered."]

  recharge:
    nl: ["Recharge at {l}", "{r} recharges at {l}", "Use charger at {l}"]
    duration: 2.0
    outcomes:
      - name: fail
        status: fail
        p: 0.02
        add: []
        delete: []
        num_eff: []
        messages: ["Charger at {l} didn't connect properly."]
      - name: success
        status: success
        p: 0.98
        add: []
        delete: []
        num_eff: ["(increase (energy ?r) 5)"]
        messages: ["{r} recharged at {l}. Energy is now (energy ?r)."]

  qc-check:
    nl: ["QC check for {a}"]
    duration: 0.2
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["QC device not responding."]
      - name: success
        status: success
        p: 1.00
        add: []
        delete: []
        num_eff: []
        messages: ["QC Report for {a} — quality=(quality ?a), flags: (defective ?a) (needs-rework ?a)"]

  realign:
    nl: ["Realign {p} with {a}"]
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["Adjustment failed; alignment unchanged."]
      - name: success
        status: success
        p: 1.00
        add: ["(aligned ?p ?a)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Realigned {p} with {a}."]
