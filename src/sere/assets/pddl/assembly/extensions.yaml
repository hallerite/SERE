meta:
  name: assembly
  description: "Assembly domain with tool management, part fastening, quality tracking, and energy"
  difficulty: medium
  tags: [stochastic, numeric, embodied, manufacturing]
  enable_numeric: true
  enable_conditional: true
  enable_durations: true
  enable_stochastic: true

predicates:
  at:
  obj-at:
  co-located:
  adjacent:
    static: true
  holding:
  clear-hand:
  in:
  open:
  equipped:
  tool-for:
    static: true
  aligned:
  installed:
  fastened:
  damaged:
  has-charger:
    static: true
  has-fixture:
    static: true
  powered:
  defective:
  needs-rework:

fluents:
  battery-cap:
  energy:
  torque:
  quality:

actions:
  wait:
    duration_var: "n"
    duration_unit: 1.0
    outcomes:
      - name: fail
        status: fail
        p: 0.0
        add: []
        delete: []
        messages: ["Time passed but nothing changed."]
      - name: success
        status: success
        p: 1.0
        add: []
        delete: []
        messages: ["Waited {n} ticks."]

  move:
    duration: 1.0
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{r} tried to move from {from} to {to} but got stuck."]
      - name: success
        status: success
        p: 0.95
        add: ["(at ?r ?to)"]
        delete: ["(at ?r ?from)"]
        num_eff: ["(decrease (energy ?r) 1)"]
        messages: ["{r} moved from {from} to {to}. Energy is now (energy ?r)."]

  open:
    duration: 0.3
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to open {c}."]
      - name: success
        status: success
        p: 0.95
        add: ["(open ?c)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{c} is now open."]

  close:
    duration: 0.3
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to close {c}."]
      - name: success
        status: success
        p: 0.95
        add: []
        delete: ["(open ?c)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{c} is now closed."]

  pick-up:
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["You fumbled {o}."]
      - name: success
        status: success
        p: 0.90
        add: ["(holding ?r ?o)"]
        delete: ["(obj-at ?o ?l)", "(clear-hand ?r)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Picked up {o}."]

  put-down:
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.07
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["{o} slipped; still in hand."]
      - name: success
        status: success
        p: 0.93
        add: ["(obj-at ?o ?l)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Placed {o} down."]

  put-in:
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Missed the opening on {c}."]
      - name: success
        status: success
        p: 0.90
        add: ["(in ?o ?c)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)", "(obj-at ?o ?l)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["{o} is now in {c}."]

  take-out:
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["You couldn't get a grip on {o} in {c}."]
      - name: success
        status: success
        p: 0.90
        add: ["(holding ?r ?o)"]
        delete: ["(in ?o ?c)", "(clear-hand ?r)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Took {o} out of {c}."]

  equip-tool:
    duration: 0.4
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to equip {t}."]
      - name: success
        status: success
        p: 0.95
        add: ["(equipped ?r ?t)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?t)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{t} equipped."]

  unequip-tool:
    duration: 0.4
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Failed to unequip {t}."]
      - name: success
        status: success
        p: 0.95
        add: ["(holding ?r ?t)"]
        delete: ["(equipped ?r ?t)", "(clear-hand ?r)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{t} unequipped."]

  align:
    duration: 1.0
    outcomes:
      - name: fail
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Failed to align {p} with {a}."]
      - name: success
        status: success
        p: 0.90
        add: ["(aligned ?p ?a)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.5)"]
        messages: ["{p} aligned with {a}."]

  fasten:
    duration: 2.0
    outcomes:
      - name: hard_defect
        status: fail
        p: 0.10
        add: ["(defective ?a)"]
        delete: []
        num_eff: ["(assign (quality ?a) 0.20)", "(decrease (energy ?r) 1.0)"]
        messages: ["QC: Hard defect on {a} detected. Disassemble and reassemble."]
      - name: soft_defect
        status: fail
        p: 0.30
        add: ["(needs-rework ?a)"]
        delete: []
        num_eff: ["(assign (quality ?a) 0.65)", "(decrease (energy ?r) 1.0)"]
        messages: ["QC: Marginal quality on {a}. Rework needed."]
      - name: success
        status: success
        p: 0.60
        add: []
        delete: ["(defective ?a)", "(needs-rework ?a)"]
        num_eff: ["(assign (quality ?a) 0.95)", "(decrease (energy ?r) 1.0)"]
        messages: ["QC: {a} passed. Quality=good."]

  set-torque:
    duration: 0.2
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["Torque dial slipped; setting unchanged."]
      - name: success
        status: success
        p: 1.00
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Torque on {t} set to {lvl}."]

  unfasten:
    duration: 2.0
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Could not break {p} loose from {a}."]
      - name: success
        status: success
        p: 0.95
        add: ["(holding ?r ?p)"]
        delete: ["(fastened ?p ?a)", "(installed ?p ?a)", "(clear-hand ?r)", "(obj-at ?p ?l)"]
        num_eff: ["(decrease (energy ?r) 1.0)"]
        messages: ["Unfastened {p} from {a}; now holding {p}."]

  place-on-bench:
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["You hesitated; still holding {o}."]
      - name: success
        status: success
        p: 1.00
        add: ["(obj-at ?o ?l)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Placed {o} on the bench."]

  power-on:
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Power button on {m} didn't register."]
      - name: success
        status: success
        p: 0.95
        add: ["(powered ?m)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{m} is now powered."]

  recharge:
    duration: 2.0
    outcomes:
      - name: fail
        status: fail
        p: 0.02
        add: []
        delete: []
        num_eff: []
        messages: ["Charger at {l} didn't connect properly."]
      - name: success
        status: success
        p: 0.98
        add: []
        delete: []
        num_eff: ["(increase (energy ?r) 5)"]
        messages: ["{r} recharged at {l}. Energy is now (energy ?r)."]

  qc-check:
    duration: 0.2
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["QC device not responding."]
      - name: success
        status: success
        p: 1.00
        add: []
        delete: []
        num_eff: []
        messages: ["QC Report for {a} — quality=(quality ?a), flags: (defective ?a) (needs-rework ?a)"]

  realign:
    duration: 0.5
    outcomes:
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        num_eff: []
        messages: ["Adjustment failed; alignment unchanged."]
      - name: success
        status: success
        p: 1.00
        add: ["(aligned ?p ?a)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Realigned {p} with {a}."]
