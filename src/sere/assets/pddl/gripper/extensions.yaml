predicates:
  room:
    nl: "{r} is a room"
    static: true
  ball:
    nl: "{b} is a ball"
    static: true
  gripper:
    nl: "{g} is a gripper"
    static: true
  at-robby:
    nl: "the robot is in {r}"
  at:
    nl: "{b} is in {r}"
  free:
    nl: "gripper {g} is free"
  carry:
    nl: "gripper {g} is carrying {o}"

actions:
  move:
    nl: "move the robot from {from} to {to}"
  pick:
    nl: "pick up {obj} in {room} with {gripper}"
  drop:
    nl: "drop {obj} in {room} from {gripper}"

meta:
  max_steps: 50
  step_penalty: -0.01
  invalid_penalty: -0.1
