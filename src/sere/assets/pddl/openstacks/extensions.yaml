meta:
  name: openstacks
  description: "Schedule product manufacturing and order shipping under a stack limit constraint"
  difficulty: hard
  tags: [scheduling, manufacturing, orders]
  max_steps: 60
  step_penalty: -0.01
  invalid_penalty: -0.1
  enable_numeric: true

predicates:
  open:
  shipped:
  requires:
    static: true
  made:

actions:
  open-order:
    outcomes:
      success:
      fail:
  make-product:
    outcomes:
      success:
      fail:
