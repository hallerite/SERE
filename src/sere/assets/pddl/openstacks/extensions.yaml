meta:
  name: openstacks
  description: "Schedule product manufacturing and order shipping under a stack limit constraint"
  difficulty: hard
  tags: [scheduling, manufacturing, orders]
  max_steps: 60
  step_penalty: -0.01
  invalid_penalty: -0.1
  enable_numeric: true

predicates:
  open:
    nl: "{o} is open"
  shipped:
    nl: "{o} is shipped"
  requires:
    nl: "{o} requires {p}"
    static: true
  made:
    nl: "{p} is made"

actions:
  open-order:
    nl: "open order {o}"
    outcomes:
      success:
        nl: "order {o} is now open"
      fail:
        nl: "failed to open order"
  make-product:
    nl: "make product {p}"
    outcomes:
      success:
        nl: "product {p} is now made"
      fail:
        nl: "failed to make product"
