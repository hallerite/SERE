meta:
  name: goldminer
  description: "A robot navigates a mine to collect gold, using bombs and lasers to clear rocks"
  difficulty: medium
  tags: [navigation, resource-management, mining]
  max_steps: 50
  step_penalty: -0.01
  invalid_penalty: -0.1

predicates:
  robot-at:
  bomb-at:
  laser-at:
  soft-rock-at:
  hard-rock-at:
  gold-at:
  arm-empty:
  holds-bomb:
  holds-laser:
  holds-gold:
  clear:
  connected:
    static: true

actions:
  move:
    outcomes:
      success:
      fail:
  pickup-laser:
    outcomes:
      success:
      fail:
  pickup-bomb:
    outcomes:
      success:
      fail:
  putdown-laser:
    outcomes:
      success:
      fail:
  detonate-bomb:
    outcomes:
      success:
      fail:
  fire-laser:
    outcomes:
      success:
      fail:
  pick-gold:
    outcomes:
      success:
      fail:
