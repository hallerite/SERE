meta:
  name: floortile
  description: "Robots paint floor tiles with specified colors while navigating a grid"
  difficulty: medium
  tags: [grid, painting, multi-agent]
  max_steps: 60
  step_penalty: -0.01
  invalid_penalty: -0.1
  enable_numeric: true

predicates:
  robot-at:
  up:
    static: true
  down:
    static: true
  right:
    static: true
  left:
    static: true
  clear:
  painted:
  robot-has:
  available-color:
    static: true
  free-color:

actions:
  change-color:
    outcomes:
      success:
      fail:
  paint-up:
    outcomes:
      success:
      fail:
  paint-down:
    outcomes:
      success:
      fail:
  up:
    outcomes:
      success:
      fail:
  down:
    outcomes:
      success:
      fail:
  right:
    outcomes:
      success:
      fail:
  left:
    outcomes:
      success:
      fail:
