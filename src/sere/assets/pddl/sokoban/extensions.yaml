predicates:
  clear:
    nl: "location {l} is empty"
  at:
    nl: "{t} is at {l}"
  at-goal:
    nl: "stone {s} is at its goal position"
  IS-GOAL:
    nl: "{l} is a goal location"
    static: true
  IS-NONGOAL:
    nl: "{l} is not a goal location"
    static: true
  MOVE-DIR:
    nl: "one can move from {from} to {to} going {dir}"
    static: true

actions:
  move:
    nl: "move player {p} from {from} to {to} going {dir}"
  push-to-nongoal:
    nl: "push stone {s} from {from} to {to} going {dir} (non-goal destination)"
  push-to-goal:
    nl: "push stone {s} from {from} to {to} going {dir} (goal destination)"

meta:
  max_steps: 100
  step_penalty: -0.01
  invalid_penalty: -0.1
  enable_numeric: true
