meta:
  name: kitchen
  description: "Kitchen domain with cooking, pouring, tea preparation, and energy management"
  difficulty: medium
  tags: [stochastic, numeric, embodied, cooking]
  enable_numeric: true
  enable_conditional: true
  enable_durations: true
  enable_stochastic: true

predicates:
  co-located:
    nl: ["{x} and {y} share a location", "{x} is at the same place as {y}", "{x} and {y} are co-located"]
  at:
    nl: ["{r} is at {l}", "{r} stands in {l}", "{r} is located at {l}"]
  obj-at:
    nl: ["{o} is at {l}", "{o} sits in {l}", "{o} is located at {l}"]
  holding:
    nl: ["{r} is holding {o}", "{r} has {o} in hand", "{r} grips {o}"]
  clear-hand:
    nl: ["{r} has a free hand", "{r}'s hand is free", "{r} is not holding anything"]
  in:
    nl: ["{o} is in {c}", "{o} sits inside {c}", "{o} is contained in {c}"]
  open:
    nl: ["{c} is open", "{c} stands open", "{c} is currently open"]
  powered:
    nl: ["{a} is powered", "{a} has power", "{a} is turned on"]
  burner-on:
    nl: ["{s}'s burner is on", "{s} is actively heating", "{s} is heating"]
  on-stove:
    nl: ["{c} sits on {s}", "{c} is on the stove {s}", "{c} is placed on {s}"]
  hot-surface:
    nl: ["{s} has a hot surface", "{s} is hot to the touch", "{s}'s surface is hot"]
  boiled:
    nl: ["{a} has boiled water", "Water has boiled in {a}", "{a} finished boiling"]
  has-water:
    nl: ["{c} contains water", "Water is present in {c}"]
  has-hot-water:
    nl: ["{m} contains hot water", "Hot water is in {m}", "{m} has hot water"]
  tea-ready:
    nl: ["Tea is ready in {m}", "{m} contains ready tea", "Tea in {m} is ready"]
  cooked:
    nl: ["{f} is cooked", "{f} is fully cooked", "{f} is ready to eat"]
  spilled:
    nl: ["There was a spill at {m}", "Liquid spilled at {m}", "{m} had a spill"]
  has-charger:
    nl: ["{l} has a charging station", "A charger is available at {l}", "{l} provides charging"]
    static: true
  adjacent:
    nl: ["{l1} is adjacent to {l2}", "{l1} neighbors {l2}", "{l1} is next to {l2}"]
    static: true
  openable:
    nl: ["{c} can be opened/closed", "{c} is openable", "{c} supports open/close"]
    static: true
  is-sink:
    nl: ["{s} is a sink/water source", "{s} can supply water"]
    static: true
  pour-out-needs-open:
    nl: ["{c} must be open to pour out", "Pouring out of {c} requires opening"]
    static: true
  pour-out-needs-closed:
    nl: ["{c} must be closed to pour out", "Pouring out of {c} requires it closed"]
    static: true
  pour-in-needs-open:
    nl: ["{c} must be open to pour into", "Pouring into {c} requires opening"]
    static: true

fluents:
  energy:
    nl: ["Energy of {r}", "{r}'s energy level", "Battery level for {r}"]
  battery-cap:
    nl: ["Battery capacity of {r}", "{r}'s maximum battery", "Max energy for {r}"]
  water-temp:
    nl: ["Water temperature in {v}", "{v}'s water temperature", "Temperature of water in {v}"]
  surface-temp:
    nl: ["Surface temperature of {s}", "{s}'s surface temperature", "Heat level of {s}"]
  food-temp:
    nl: ["Temperature of {f}", "{f}'s temperature", "Heat of {f}"]

actions:
  wait:
    nl: ["Wait for {n} ticks", "Pause {n} ticks", "Idle for {n} ticks"]
    duration_var: "n"
    duration_unit: 1.0
    outcomes:
      - name: noop
        status: success
        p: 1.00
        add: []
        delete: []
        messages: ["Waited {n} ticks."]
      - name: fail
        status: fail
        p: 0.00
        add: []
        delete: []
        messages: ["Nothing happened."]

  move:
    nl: ["Move {r} from {from} to {to}", "Go from {from} to {to} with {r}", "{r} moves {from} → {to}"]
    duration: 1.0
    outcomes:
      - name: stuck
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{r} tried to move from {from} to {to} but got stuck. No progress."]
      - name: arrive
        status: success
        p: 0.95
        add: ["(at ?r ?to)"]
        delete: ["(at ?r ?from)"]
        num_eff: ["(decrease (energy ?r) 1)"]
        messages: ["{r} moved from {from} to {to}. Energy is now (energy ?r)."]

  open:
    nl: ["Open {c}", "{r} opens {c}", "Open the {c}"]
    duration: 0.5
    outcomes:
      - name: fumble
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["You fumbled with {c}. Still closed."]
      - name: opened
        status: success
        p: 0.95
        add: ["(open ?c)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{c} is now open."]

  close:
    nl: ["Close {c}", "{r} closes {c}", "Shut {c}"]
    duration: 0.5
    outcomes:
      - name: unlatch
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["You tried to close {c} but it didn't latch."]
      - name: closed
        status: success
        p: 0.95
        add: []
        delete: ["(open ?c)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{c} is now closed."]

  pick-up:
    nl: ["Pick up {o}", "{r} picks up {o}", "Grab {o}"]
    duration: 0.5
    outcomes:
      - name: drop
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["You fumbled {o}. Try again."]
      - name: holding
        status: success
        p: 0.90
        add: ["(holding ?r ?o)"]
        delete: ["(obj-at ?o ?l)", "(clear-hand ?r)", "(on-stove ?o ?s)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Picked up {o}."]

  put-down:
    nl: ["Put down {o}", "{r} puts down {o}", "Place {o} down"]
    duration: 0.5
    outcomes:
      - name: slip
        status: fail
        p: 0.07
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{o} slipped; still in hand."]
      - name: placed
        status: success
        p: 0.93
        add: ["(obj-at ?o ?l)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)", "(on-stove ?o ?s)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Placed {o} down."]

  put-in:
    nl: ["Put {o} into {c}", "{r} inserts {o} into {c}", "Place {o} in {c}"]
    duration: 0.5
    outcomes:
      - name: miss
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Missed the opening on {c}. Try again."]
      - name: inserted
        status: success
        p: 0.90
        add: ["(in ?o ?c)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?o)", "(obj-at ?o ?l)", "(on-stove ?o ?s)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["{o} is now in {c}."]

  take-out:
    nl: ["Take {o} out of {c}", "{r} removes {o} from {c}", "Retrieve {o} from {c}"]
    duration: 0.5
    outcomes:
      - name: fail_grip
        status: fail
        p: 0.10
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["You couldn't get a grip on {o} in {c}."]
      - name: retrieved
        status: success
        p: 0.90
        add: ["(holding ?r ?o)"]
        delete: ["(in ?o ?c)", "(clear-hand ?r)"]
        num_eff: ["(decrease (energy ?r) 0.3)"]
        messages: ["Took {o} out of {c}."]

  power-on:
    nl: ["Power on {a}", "{r} turns on {a}", "Switch on {a}"]
    duration: 0.5
    outcomes:
      - name: no_click
        status: fail
        p: 0.02
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Power button on {a} didn't register."]
      - name: powered_on
        status: success
        p: 0.98
        add: ["(powered ?a)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{a} is now powered."]

  power-off:
    nl: ["Power off {a}", "{r} turns off {a}", "Switch off {a}"]
    duration: 0.5
    outcomes:
      - name: power_fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["Power button on {a} didn't respond."]
      - name: powered_off
        status: success
        p: 0.95
        add: []
        delete: ["(powered ?a)", "(burner-on ?a)"]
        num_eff: ["(decrease (energy ?r) 0.15)"]
        messages: ["{a} is now powered off."]

  place-on-stove:
    nl: ["Place {c} on {s}", "{r} sets {c} on {s}", "Put {c} onto {s}"]
    duration: 0.5
    outcomes:
      - name: slip
        status: fail
        p: 0.08
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{c} slipped; still in hand."]
      - name: placed_on_stove
        status: success
        p: 0.92
        add: ["(on-stove ?c ?s)", "(obj-at ?c ?l)", "(clear-hand ?r)"]
        delete: ["(holding ?r ?c)"]
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{c} is now on {s}."]

  ignite-stove:
    nl: ["Ignite {s}", "{r} ignites {s}", "Turn on the burner on {s}"]
    duration: 0.5
    outcomes:
      - name: no_ignite
        status: fail
        p: 0.06
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["{s} did not ignite."]
      - name: burner_on
        status: success
        p: 0.94
        add: ["(burner-on ?s)"]
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["{s} burner is now on."]

  extinguish-stove:
    nl: ["Extinguish {s}", "{r} turns off the burner on {s}", "Shut down {s}"]
    duration: 0.5
    outcomes:
      - name: fail_to_extinguish
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["{s} burner did not shut off."]
      - name: burner_off
        status: success
        p: 0.95
        add: []
        delete: ["(burner-on ?s)"]
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{s} burner is now off."]

  heat-stove:
    nl: ["Heat {s} for {n} ticks (+40°C per tick)", "Run {s} for {n} ticks (+40°C per tick)", "Preheat {s} for {n} ticks"]
    duration_var: "n"
    duration_unit: 0.5
    outcomes:
      - name: heat_fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{s} did not heat as expected."]
      - name: heat_ok
        status: success
        p: 0.95
        add: []
        delete: []
        num_eff: ["(increase (surface-temp ?s) 40*?n)", "(decrease (energy ?r) 0.3)"]
        messages: ["{s} surface temperature is now (surface-temp ?s)°C."]

  cool-stove:
    nl: ["Cool {s} for {n} ticks (-30°C per tick)", "Let {s} cool for {n} ticks", "Cool down {s}"]
    duration_var: "n"
    duration_unit: 0.5
    outcomes:
      - name: cool_fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.05)"]
        messages: ["{s} did not cool as expected."]
      - name: cool_ok
        status: success
        p: 0.95
        add: []
        delete: []
        num_eff: ["(decrease (surface-temp ?s) 30*?n)", "(decrease (energy ?r) 0.1)"]
        messages: ["{s} surface temperature is now (surface-temp ?s)°C."]

  heat-on-stove:
    nl: ["Heat {c} on {s} for {n} ticks (+20°C per tick)", "Warm {c} on {s} for {n} ticks", "Simmer {c} on {s}"]
    duration_var: "n"
    duration_unit: 0.5
    outcomes:
      - name: heat_fail
        status: fail
        p: 0.06
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["Heating {c} on {s} failed to start."]
      - name: heat_ok
        status: success
        p: 0.94
        add: []
        delete: []
        num_eff: ["(increase (water-temp ?c) 20*?n)", "(decrease (energy ?r) 0.3)"]
        messages: ["Water temperature in {c} is now (water-temp ?c)°C."]

  cook-on-stove:
    nl: ["Cook {f} in {c} on {s} for {n} ticks", "Heat {f} on {s} for {n} ticks", "Cook {f} on {s}"]
    duration_var: "n"
    duration_unit: 0.5
    outcomes:
      - name: cook_fail
        status: fail
        p: 0.08
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["{f} did not cook evenly."]
      - name: cook_ok
        status: success
        p: 0.92
        add: []
        delete: []
        num_eff: ["(increase (food-temp ?f) 25*?n)", "(decrease (energy ?r) 0.3)"]
        messages: ["{f} temperature is now (food-temp ?f)°C."]

  fill-water:
    nl: ["Fill {k} with water from {s}", "{r} fills {k} at {s}"]
    duration: 1.0
    outcomes:
      - name: sputter
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.1)"]
        messages: ["The faucet sputtered; {k} didn't fill."]
      - name: filled
        status: success
        p: 0.95
        add: ["(has-water ?k)"]
        delete: ["(has-hot-water ?k)"]
        num_eff: ["(assign (water-temp ?k) 20)", "(decrease (energy ?r) 0.2)"]
        messages: ["{k} is now filled with water (20°C)."]

  heat-kettle:
    nl: ["Heat {k} for {n} ticks (each tick increases water temp by 15°C)", "Run {k} for {n} ticks (+15°C per tick)", "Heat cycle on {k}: {n} ticks"]
    duration_var: "n"
    duration_unit: 0.5
    outcomes:
      - name: heat_fail
        status: fail
        p: 0.05
        add: []
        delete: []
        num_eff: []
        messages: ["Heating cycle on {k} failed to start."]
      - name: heat_ok
        status: success
        p: 0.95
        add: []
        delete: []
        num_eff: ["(increase (water-temp ?k) 15*?n)"]
        messages: ["Heating {k}. Water temperature is now (water-temp ?k)°C."]

  pour:
    nl: ["Pour from {k} into {m}", "{r} pours {k} into {m}", "Transfer water {k} → {m}"]
    duration: 1.0
    outcomes:
      - name: spill_closed_target
        status: success
        p: 1.0
        when: ["(pour-in-needs-open ?m)", "(not (open ?m))"]
        add: ["(spilled ?m)"]
        delete: ["(has-water ?k)", "(has-hot-water ?k)"]
        messages: ["Tried to pour into {m} while closed — water spilled."]
      - name: blocked_target_requires_closed_but_open
        status: fail
        p: 1.0
        when: ["(pour-in-needs-closed ?m)", "(open ?m)"]
        add: []
        delete: []
        messages: ["{m} must be closed to pour into it."]
      - name: transfer_hot
        status: success
        p: 1.0
        when: ["(or (not (pour-in-needs-open ?m)) (open ?m))", "(>= (water-temp ?k) 80)"]
        add: ["(has-water ?m)", "(has-hot-water ?m)"]
        delete: ["(spilled ?m)", "(has-water ?k)", "(has-hot-water ?k)"]
        num_eff: ["(assign (water-temp ?m) (water-temp ?k))"]
        messages: ["Hot water transferred to {m}."]
      - name: transfer_cool
        status: success
        p: 1.0
        when: ["(or (not (pour-in-needs-open ?m)) (open ?m))", "(< (water-temp ?k) 80)"]
        add: ["(has-water ?m)"]
        delete: ["(spilled ?m)", "(has-hot-water ?m)", "(has-water ?k)", "(has-hot-water ?k)"]
        num_eff: ["(assign (water-temp ?m) (water-temp ?k))"]
        messages: ["Water transferred to {m} (not hot)."]

  steep-tea:
    nl: ["Steep tea in {m} (requires water ≥80°C)", "Steep {tb} in {m} (water ≥80°C)", "Brew tea in {m} (≥80°C)"]
    duration: 2.0
    outcomes:
      - name: steep_fail
        status: fail
        p: 0.08
        add: []
        delete: []
        num_eff: ["(decrease (energy ?r) 0.2)"]
        messages: ["Steeping failed—bag tore or drifted. Try again."]
      - name: steep_ok
        status: success
        p: 0.92
        add: ["(tea-ready ?m)"]
        delete: ["(spilled ?m)"]
        num_eff: ["(decrease (energy ?r) 0.5)"]
        messages: ["Tea steeped. {m} is ready."]

  recharge:
    nl: ["Recharge at {l}", "{r} recharges at {l}", "Use charger at {l}"]
    duration: 2.0
    outcomes:
      - name: recharge_fail
        status: fail
        p: 0.02
        add: []
        delete: []
        num_eff: []
        messages: ["Charger at {l} didn't connect properly."]
      - name: recharge_ok
        status: success
        p: 0.98
        add: []
        delete: []
        num_eff: ["(increase (energy ?r) 5)"]
        messages: ["{r} recharged at {l}. Energy is now (energy ?r)."]
